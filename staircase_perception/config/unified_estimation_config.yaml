# ROS Node Params - Topic Names and Pre-processing - Staircase Perception Params
/**:
  ros__parameters:
    
    use_sim_time: false

    staircase_perception_params:
      global_frame_id: "global"

    # ROS Topics
    staircase_perception_topics:
      point_cloud_topic: "registered_point_cloud"  # cloud already in odom frame, produced by pointcloud_registration_node (bridges raw /rslidar_points)
      odometry_topic: "dog_odom"                    # resolves to /dog_odom
      global_transform_topic: "transform"
      
      staircase_status_topic: "staircase_estimation_robot_node_status"
      staircase_enable_topic: "staircase_estimation_robot_node_enable"

      staircase_estimates_topic: "/staircase_estimation_robot_node/staircase_estimates"
      staircase_measurements_topic: "staircase_estimation_robot_node/staircase_measurements"

      # std_msgs/Bool: true when the robot is standing within a detected staircase footprint
      robot_on_staircase_topic: "staircase_estimation_robot_node/robot_on_staircase"


staircase_estimation_robot_node:
  ros__parameters:
    # Node Options
    ros_rate: 10.0
    debug: false
    publish_measurements: false
    robot_name: "robot"
    odom_frame_id: "odom"
    body_frame_id: "base_link"
    transform_detections_to_global: false

    # On frames where the detector finds nothing, keep re-publishing the most recently detected
    # staircases whose nearest step is within this distance [m] (3D) of the robot. Bridges momentary
    # detector dropouts so a clearly-present nearby staircase doesn't flicker out. Set <= 0 to disable.
    detection_retention_range: 5.0
    # Only retain a staircase for this long [s] after it was last actually detected. Bridges brief
    # flicker but stops showing a staircase the robot can no longer see. Set <= 0 for no time limit.
    detection_hold_time: 1.0

    # Lifetime [s] of the debug line markers (only used when debug: true). Small value so stale lines
    # decay instead of freezing in RViz when the robot moves on or the detector stops emitting lines.
    debug_marker_lifetime: 0.5

    # robot_on_staircase test (Bool on robot_on_staircase_topic). BOTH conditions must hold:
    #  - Proximity: the robot is within this distance [m] (3D) of an actual step. This is the main
    #    guard against false positives -- a staircase several meters away (or one on another floor,
    #    which differs mostly in z) is rejected. Increase if the flag flickers off while truly on a
    #    wide staircase; decrease if it triggers too early when approaching.
    on_staircase_proximity: 2.0
    #  - Footprint: the robot's (x,y) lies inside the staircase's circumscribed rectangle, expanded
    #    by this margin [m]. Rejects a robot that is close to one end but standing off to the side.
    on_staircase_xy_margin: 0.3

    # Point Cloud Parameters
    stair_pointcloud:
      leaf_size: 0.025
      # Cloud Range Cropped for Search 
      # Changing this range will also increasing point cloud accumulation range. 
      # Please also update 'stair_line_extractor.max_range' paramter if you want to increase detection range.
      min_range_y: -4.0
      max_range_y:  4.0 # [meters]
      min_range_x: -4.0 
      max_range_x: 4.0  # [meters]
      min_range_z: -2.5
      max_range_z: 1.5  # [meters]

    # Stair Detector Parameters
    stair_detector:
      min_stair_count: 3          # Unit: Minimum number of stairs for detection
      stair_slope_min: 0.35       # Unit: Radians
      stair_slope_max: 1.22       # Unit: Radians 

      min_stair_width: 0.75       # Unit: Meters # Change this to change the minimum stair width that can be detected

      min_stair_height: 0.11       # Unit: Meters # Change this to change the minimum stair height (rise) that can be detected
      max_stair_height: 0.3      # Unit: Meters # Change this to change the maximum stair height (run) that can be detected
      min_stair_depth: 0.15      # Unit: Meters # Change this to change the minimum stair depth (run) that can be detected
      max_stair_depth: 0.45       # Unit: Meters # Change this to change the maximum stair depth (run) that can be detected

      max_stair_curvature: 0.55   # Unit: Radians # Change this to change maximum staircase curvature for curved staircases

      # --- Detection gating: reject far / inconsistent detections (set any to <= 0 to disable that gate) ---
      max_detection_range: 5.0        # Unit: Meters # Reject lines/steps whose center is farther than this from the robot.
                                       # NOTE: this gate prunes individual steps BEFORE staircase search, so a value smaller
                                       # than the staircase's horizontal extent truncates the detection to only its near end.
                                       # Keep it >= 'stair_line_extractor.max_range' (5.0) so the full staircase is reported;
                                       # far false positives are instead rejected by max_line_fit_stddev + min_detections_to_confirm.
      max_line_fit_stddev: 0.05       # Unit: Meters # Reject lines whose radius-fit std-dev exceeds this (poor/uncertain fit from sparse, far points)
      max_step_depth_variation: 0.08  # Unit: Meters # Reject staircases whose inter-step depth std-dev exceeds this (irregular spacing)
      max_step_height_variation: 0.05 # Unit: Meters # Reject staircases whose inter-step height std-dev exceeds this (irregular rise)

      angle_resolution: 1.0       # Unit: Degrees (For front-view projection)
      robot_height: 0.5           # Unit: Meters (Used to segment ground height)
      initialization_range: 0.5   # Unit: Meters (Range from the ground to search for the initial two steps)
      ground_height_buffer: 0.05  # Unit: Meters (Buffer from robot height where ground lines are classified)
      use_ramp_detection: true    # Eliminates false positives by ensuring lines on ramps are considered, making this false will potentially lead to increased detections at the expense of false positives

    # Line Extractor Params 
    stair_line_extractor:
      # Weighted Line Fitting
      bearing_variance: 0.0001
      range_variance: 0.001
      z_variance: 0.0004
      least_sq_angle_thresh: 0.05
      least_sq_radius_thresh: 0.075

      # Split and Merge Params for Line Detection Node
      max_line_gap: 0.2         # [Unit: Meters]
      min_range: 0.1            # [Unit: Meters]
      max_range: 5.0            # [Unit: Meters]  # Change this along with the 'stair_pointcloud.m**' params to increase range of detections.
      min_split_distance: 0.2   # [Unit: Meters]
      min_line_points: 7        # [Unit: Count]
      outlier_distance: 0.2     # [Unit: Meters]

    stair_manager:
      yaw_threshold: 0.75 # [Unit: Radians] Angle between current staircase and incoming detection to be considered similar
      filter_type: "l_ekf" # "averg" for Simple Averaging,"l_ekf" for EKF in Local Frame, "maxim" for Maximizing filter
      # World-frame confirmation: a staircase must be re-observed/associated this many times before it is published.
      # Suppresses pose-dependent false positives that only appear from a single viewpoint as the robot turns. Set 1 to disable.
      min_detections_to_confirm: 3 # [Unit: Count]

    stair_ekf_params:
      initial_measurement_sigmas: [0.1, 0.1, 0.2, 0.2] # r, theta, z_start, z_end
      initial_pose_sigmas: [0.00, 0.00, 0.005, 0.03] # x, y, z, yaw

      measurement_sigmas: [0.075, 0.075, 0.07, 0.071]
      pose_sigmas: [0.000, 0.00, 0.02, 0.03] # x, y, z, yaw

      model_noise_sigmas: [0.005, 0.005, 0.0, 0.05, 0.1, 0.05] # Noise in model (height, depth, width, initial angle, deviation, end_angle)

stair_viz_node:
  ros__parameters:
    # Lifetime [s] of RViz markers. Detected staircases are re-published every frame, so they stay
    # visible; once a staircase stops being detected its markers expire after this time. Keep it small
    # (a few frames at the detection rate) to show only current detections instead of accumulating old ones.
    marker_lifetime: 0.5